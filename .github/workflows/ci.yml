name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          config: .markdownlint-cli2.jsonc
          globs: |
            README.md
            CHANGELOG.md

  code-block-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check code block integrity
        run: |
          echo "Checking for unclosed code blocks"
          while IFS= read -r -d '' f; do
            count=$(grep -c '```' "$f" 2>/dev/null || echo 0)
            if [ $((count % 2)) -ne 0 ]; then
              echo "ERROR: Unclosed code block in $f"
              exit 1
            fi
          done < <(find ./project-onboard ./project-docs -type f -name "*.md" -print0)
          echo "All code blocks properly closed"

      - name: Copyright headers
        run: |
          echo "Checking copyright headers on .md files..."
          missing=0
          while IFS= read -r -d '' f; do
            header="$(head -n 20 "$f")"
            if ! printf '%s\n' "$header" | grep -q "Copyright (C)"; then
              echo "MISSING copyright: $f"; missing=1; continue
            fi
            if ! printf '%s\n' "$header" | grep -q "SPDX-License-Identifier:"; then
              echo "MISSING SPDX: $f"; missing=1; continue
            fi
          done < <(
            find ./project-onboard ./project-docs \
              -type f -name "*.md" \
              -not -path "*/tests/fixtures/*" \
              -print0
          )
          if [ "$missing" -ne 0 ]; then
            echo "ERROR: Some files missing Copyright/SPDX headers"
            exit 1
          fi
          echo "All files have copyright headers"
