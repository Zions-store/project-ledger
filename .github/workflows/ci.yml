name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          config: .markdownlint-cli2.jsonc
          globs: |
            README.md
            CHANGELOG.md

  code-block-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check code block integrity
        run: |
          echo "Checking for unclosed code blocks"
          while IFS= read -r -d '' f; do
            count=$(grep -c '```' "$f" 2>/dev/null || echo 0)
            if [ $((count % 2)) -ne 0 ]; then
              echo "ERROR: Unclosed code block in $f"
              exit 1
            fi
          done < <(find ./project-onboard ./project-docs -type f -name "*.md" -print0)
          echo "All code blocks properly closed"

      - name: Check markdown headers (Copyright/SPDX / YAML frontmatter-aware)
        run: |
          python tools/validate_markdown_headers.py project-onboard project-docs
