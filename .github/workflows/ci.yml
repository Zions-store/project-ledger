name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          config: .markdownlint-cli2.jsonc
          globs: |
            README.md
            CHANGELOG.md

  code-block-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check code block integrity
        run: |
          echo "Checking for unclosed code blocks"
          for f in README.md CHANGELOG.md; do
            if [ -f "$f" ]; then
              count=$(grep -c '```' "$f" 2>/dev/null || echo 0)
              if [ $((count % 2)) -ne 0 ]; then
                echo "ERROR: Unclosed code block in $f"
                exit 1
              fi
            fi
          done
          echo "All code blocks properly closed"

      - name: Check copyright headers
        run: |
          echo "Checking copyright headers on .md files..."
          missing=0
          for f in $(find . -name "*.md" -not -path "./.git/*" -not -path "./.tmp_validation/*" -not -path "./node_modules/*"); do
            if ! head -3 "$f" | grep -q "Copyright\|SPDX"; then
              echo "MISSING: $f"
              missing=1
            fi
          done
          if [ $missing -eq 1 ]; then
            echo "ERROR: Some files missing Copyright/SPDX headers"
            exit 1
          fi
          echo "All files have copyright headers"
