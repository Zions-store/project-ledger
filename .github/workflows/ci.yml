name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          config: .markdownlint-cli2.jsonc
          globs: |
            game-design-doc-governance/README.md
            game-design-doc-governance/CHANGELOG.md
            game-design-doc-governance/SKILL.md
            game-design-doc-governance/MANIFEST.md
            game-design-doc-governance/modules/**/*.md
            game-design-doc-governance/templates/**/*.md
            game-design-doc-governance/tests/**/*.md

  code-block-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Markdown code fences
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import sys

          roots = [
              Path("README.md"),
              Path("CHANGELOG.md"),
              Path("SKILL.md"),
              Path("MANIFEST.md"),
              Path("modules"),
              Path("templates"),
              Path("tests"),
              Path("doc_modules"),
          ]

          files = []
          for root in roots:
              if root.is_file():
                  files.append(root)
              elif root.is_dir() and root.exists():
                  files.extend(root.rglob("*.md"))
                  files.extend(root.rglob("*.tmpl"))

          bad = []
          for path in sorted(set(files)):
              text = path.read_text(encoding="utf-8", errors="replace")
              fence_count = 0
              for line in text.splitlines():
                  if line.lstrip().startswith("```"):
                      fence_count += 1
              if fence_count % 2 != 0:
                  bad.append((str(path), fence_count))

          if bad:
              print("Unclosed Markdown code fences detected:")
              for path, count in bad:
                  print(f"- {path}: {count} fence lines")
              sys.exit(1)

          print(f"Checked {len(files)} markdown/template files; all code fences are balanced.")
          PY

  python-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install pyyaml
      - name: Syntax check
        run: python -m py_compile game-design-doc-governance/tools/global_doc_audit.py
      - name: CLI smoke
        run: python game-design-doc-governance/tools/global_doc_audit.py --help
      - name: Fixture baseline regression
        run: |
          python game-design-doc-governance/tools/global_doc_audit.py \
            --root    game-design-doc-governance/tests/fixtures/sample_open_world/md\ file \
            --style   game-design-doc-governance/tests/fixtures/sample_open_world/md\ file/STYLE_GUIDE.md \
            --profile game-design-doc-governance/tests/fixtures/sample_open_world/md\ file/Project_Profile.yaml \
            --out     /tmp/gdd-ci \
            --baseline game-design-doc-governance/tests/expected/sample_fixture_baseline.json \
            --no-state

  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install pyyaml pytest
      - name: Run pytest
        run: |
          cd game-design-doc-governance/tests
          python -m pytest -v
