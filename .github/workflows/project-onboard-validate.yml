name: project-onboard Validate

on:
  push:
    branches: [master, "release/**"]
    paths:
      - "project-onboard/**"
      - ".github/workflows/project-onboard-validate.yml"
  pull_request:
    branches: [master]
    paths:
      - "project-onboard/**"
      - ".github/workflows/project-onboard-validate.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: project-onboard/tests

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: pip install -r requirements.txt

      - name: Compile check Python files
        run: python -m compileall -q ..

      - name: UTF-8 validation
        run: python validate_utf8.py

      - name: Frontmatter validation
        run: python validate_frontmatter.py

      - name: Rule pack validation
        run: python validate_rule_packs.py
