# Genre profile: Linear Action Adventure.
schema_version: 1

profile:
  name: linear_action_adventure
  description: Linear, level-based action adventure with strong performance/story beats and set-piece encounters.
  primary_type: linear_action_adventure
  secondary_types: [cinematic_narrative]

recommended_docs:
  - Design_Document.md
  - STYLE_GUIDE.md
  - Naming.md
  - Narrative_Bible.md
  - Narrative_Script.md
  - Level_Design.md
  - Encounter_Design.md
  - Gameplay_Systems.md
  - Character_Sheets.md
  - UI_UX_Design.md

optional_docs: [Collectibles_Design.md, Pacing_Design.md]
disabled_docs: [Multiplayer_Design.md, LiveOps_Design.md, Resource_And_Economy.md, Monetization_Design.md]

high_risk_boundaries:
  - Script vs Level
  - Encounter vs Gameplay
  - Character vs Narrative
  - GDD vs Level Details

audit_focus:
  - Script performance separated from level triggers
  - Encounter uses gameplay numbers, does not redefine them
  - Character narrative meaning vs gameplay numbers
  - GDD keeps summaries, not level detail

suggested_doc_modules:
  - Narrative_Bible
  - Narrative_Script
  - Level_Design
  - Encounter_Design
  - Gameplay_Systems
  - Character_Sheets
  - UI_UX_Design
  - Collectibles_Design
